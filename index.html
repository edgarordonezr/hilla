<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Día de la Mujer, Hilla 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Petit+Formal+Script&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #c2185b;
    --blush: #f8bbd0;
    --deep: #880e4f;
    --cream: #fff8f5;
    --purple: #7b1fa2;
    --purple-light: #ce93d8;
  }

  body {
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    cursor: default;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, #fce4ec88 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, #e1bee788 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, #fff8f5 0%, #ffeef4 100%);
    z-index: 0;
    animation: bgPulse 6s ease-in-out infinite alternate;
  }

  @keyframes bgPulse {
    from { opacity: 0.8; }
    to   { opacity: 1; }
  }

  /* ── PETALS ── */
  .petals-container {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 1; overflow: hidden;
  }
  .petal {
    position: absolute; top: -60px;
    font-size: 1.5rem; opacity: 0;
    animation: falling linear infinite;
  }
  @keyframes falling {
    0%   { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(360deg) scale(1.1); opacity: 0; }
  }

  /* ══════════════════════════════════
     STAGE 1 — COUNTDOWN
  ══════════════════════════════════ */
  #stage-countdown {
    position: fixed; inset: 0;
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a0a2e 0%, #2d0a3e 50%, #1a0a2e 100%);
    transition: opacity 0.8s ease;
  }

  .countdown-number {
    font-family: 'Petit Formal Script', cursive;
    font-size: clamp(8rem, 25vw, 14rem);
    color: var(--purple-light);
    text-shadow:
      0 0 40px rgba(206,147,216,0.8),
      0 0 80px rgba(123,31,162,0.5);
    position: absolute;
    opacity: 0;
    transform: scale(2);
    transition: none;
  }

  .countdown-number.show {
    animation: countPop 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  .countdown-number.hide {
    animation: countFade 0.4s ease-in forwards;
  }

  @keyframes countPop {
    from { opacity: 0; transform: scale(2); }
    40%  { opacity: 1; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes countFade {
    from { opacity: 1; transform: scale(1); }
    to   { opacity: 0; transform: scale(0.4); }
  }

  /* ══════════════════════════════════
     STAGE 2 — HEART CTA
  ══════════════════════════════════ */
  #stage-heart {
    position: fixed; inset: 0;
    z-index: 99;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px;
    background: linear-gradient(135deg, #1a0a2e 0%, #2d0a3e 50%, #1a0a2e 100%);
    opacity: 0;
    transition: opacity 0.8s ease;
    cursor: pointer;
  }
  #stage-heart.visible {
    display: flex;
  }
  #stage-heart.fade-in {
    opacity: 1;
  }

  .big-heart {
    font-size: clamp(5rem, 18vw, 9rem);
    animation: heartPulse 1.6s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(206,147,216,0.7));
    user-select: none;
  }

  @keyframes heartPulse {
    0%, 100% { transform: scale(1); }
    30%       { transform: scale(1.15); }
    60%       { transform: scale(1.05); }
  }

  .click-hint {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 4vw, 1.5rem);
    color: var(--purple-light);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 300;
    opacity: 0.85;
    animation: hintBlink 2.5s ease-in-out infinite;
  }

  @keyframes hintBlink {
    0%, 100% { opacity: 0.85; }
    50%       { opacity: 0.4; }
  }

  /* Click ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(206,147,216,0.3);
    transform: scale(0);
    animation: rippleOut 0.8s ease-out forwards;
    pointer-events: none;
  }
  @keyframes rippleOut {
    to { transform: scale(6); opacity: 0; }
  }

  /* ══════════════════════════════════
     STAGE 3 — REVEAL TEXT
  ══════════════════════════════════ */
  #stage-reveal {
    position: fixed; inset: 0;
    z-index: 98;
    display: none;
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a0a2e 0%, #2d0a3e 50%, #1a0a2e 100%);
    opacity: 0;
    transition: opacity 0.7s ease;
  }
  #stage-reveal.visible { display: flex; }
  #stage-reveal.fade-in { opacity: 1; }

  .reveal-text {
    font-family: 'Petit Formal Script', cursive;
    font-size: clamp(1.8rem, 7vw, 3.5rem);
    color: white;
    text-align: center;
    line-height: 1.6;
    padding: 0 32px;
    text-shadow: 0 2px 30px rgba(206,147,216,0.5);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1s ease, transform 1s ease;
  }
  .reveal-text.show {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-text em {
    color: var(--purple-light);
    font-style: normal;
  }

  /* ══════════════════════════════════
     STAGE 4 — CARD
  ══════════════════════════════════ */
  #stage-card {
    position: relative;
    z-index: 10;
    display: none;
    opacity: 0;
    transition: opacity 1s ease;
  }
  #stage-card.visible { display: block; }
  #stage-card.fade-in { opacity: 1; }

  .card {
    position: relative;
    width: min(520px, 92vw);
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(20px);
    border: 1.5px solid rgba(194,24,91,0.18);
    border-radius: 2px;
    padding: 56px 52px 48px;
    text-align: center;
    box-shadow:
      0 4px 40px rgba(194,24,91,0.10),
      0 1px 0 rgba(255,255,255,0.9) inset,
      inset 0 0 60px rgba(252,228,236,0.4);
    animation: cardIn 1.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes cardIn {
    from { transform: translateY(40px) scale(0.96); }
    to   { transform: translateY(0) scale(1); }
  }

  .card::before, .card::after {
    content: '✿';
    position: absolute;
    font-size: 1.2rem;
    color: var(--rose);
    opacity: 0.4;
  }
  .card::before { top: 14px; left: 18px; }
  .card::after  { bottom: 14px; right: 18px; transform: rotate(180deg); }

  .flowers-top {
    font-size: 2.6rem;
    letter-spacing: 0.15em;
    margin-bottom: 24px;
    animation: floralSway 3s ease-in-out infinite alternate;
    display: block;
  }
  @keyframes floralSway {
    from { transform: scale(1) rotate(-1deg); }
    to   { transform: scale(1.06) rotate(1deg); }
  }

  .date-tag {
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--rose);
    opacity: 0.7;
    margin-bottom: 18px;
    animation: fadeUp 1.2s 0.3s both;
  }

  .name {
    font-family: 'Petit Formal Script', cursive;
    font-size: clamp(3rem, 10vw, 4.5rem);
    color: var(--deep);
    line-height: 1.1;
    margin-bottom: 12px;
    animation: fadeUp 1.2s 0.5s both;
    text-shadow: 0 2px 20px rgba(136,14,79,0.15);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    animation: fadeUp 1.2s 0.7s both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rose), transparent);
    opacity: 0.35;
  }
  .divider span { color: var(--rose); font-size: 1rem; opacity: 0.6; }

  .message {
    font-size: clamp(1.1rem, 3.5vw, 1.35rem);
    color: #6d2b4a;
    line-height: 1.75;
    font-style: italic;
    font-weight: 300;
    margin-bottom: 28px;
    animation: fadeUp 1.2s 0.9s both;
  }

  .date {
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    color: var(--rose);
    opacity: 0.55;
    text-transform: uppercase;
    animation: fadeUp 1.2s 1.1s both;
  }

  .heart {
    display: inline-block;
    animation: heartbeat 1.4s ease-in-out infinite;
    color: var(--purple);
    font-size: 1.1rem;
    margin: 0 4px;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14%       { transform: scale(1.25); }
    28%       { transform: scale(1); }
    42%       { transform: scale(1.15); }
    70%       { transform: scale(1); }
  }

  .signature {
    margin-top: 20px;
    font-size: 1rem;
    color: #6d2b4a;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.05em;
    animation: fadeUp 1.2s 1.4s both;
  }
  .signature strong {
    font-family: 'Petit Formal Script', cursive;
    font-size: 1.3rem;
    font-style: normal;
    color: var(--purple);
    font-weight: 400;
  }

  .purple-hearts {
    margin-top: 10px;
    font-size: 1.3rem;
    letter-spacing: 0.2em;
    animation: fadeUp 1.2s 1.5s both;
  }

  .flowers-bottom {
    margin-top: 22px;
    font-size: 1.4rem;
    letter-spacing: 0.3em;
    opacity: 0.5;
    animation: fadeUp 1.2s 1.3s both;
  }

  .ribbon {
    position: absolute;
    top: -1px; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--rose), transparent);
    border-radius: 2px;
    opacity: 0.6;
  }

  .card:hover {
    box-shadow:
      0 8px 60px rgba(194,24,91,0.16),
      0 1px 0 rgba(255,255,255,0.9) inset,
      inset 0 0 80px rgba(252,228,236,0.5);
    transition: box-shadow 0.6s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ══════════════════════════════════
     STAGE 3b — FUNNY STAGE
  ══════════════════════════════════ */
  #stage-funny {
    position: fixed; inset: 0;
    z-index: 97;
    display: none;
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a0a2e 0%, #2d0a3e 50%, #1a0a2e 100%);
    opacity: 0;
    transition: opacity 0.7s ease;
    gap: 0;
  }
  #stage-funny.visible { display: flex; }
  #stage-funny.fade-in { opacity: 1; }

  .funny-photo {
    width: clamp(140px, 28vw, 220px);
    border-radius: 16px;
    border: 3px solid rgba(206,147,216,0.5);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    opacity: 0;
    transform: translateX(-40px);
    transition: opacity 0.7s ease, transform 0.7s ease;
    flex-shrink: 0;
  }
  .funny-photo.show { opacity: 1; transform: translateX(0); }

  .funny-middle {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    opacity: 0;
    transition: opacity 0.6s ease;
    flex-shrink: 0;
  }
  .funny-middle.show { opacity: 1; }

  .funny-arrow {
    font-size: clamp(2rem, 8vw, 3.5rem);
    color: var(--purple-light);
    filter: drop-shadow(0 0 10px rgba(206,147,216,0.8));
    animation: arrowBounce 0.8s ease-in-out infinite alternate;
  }
  @keyframes arrowBounce {
    from { transform: translateX(0); }
    to   { transform: translateX(-8px); }
  }

  .funny-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.85rem, 3vw, 1.2rem);
    color: white;
    text-align: center;
    font-style: italic;
    font-weight: 300;
    line-height: 1.4;
    letter-spacing: 0.05em;
    text-shadow: 0 2px 10px rgba(206,147,216,0.5);
    max-width: 160px;
  }

  .funny-emoji {
    width: clamp(90px, 18vw, 140px);
    opacity: 0;
    transform: translateX(40px) rotate(10deg);
    transition: opacity 0.7s ease, transform 0.7s ease;
    flex-shrink: 0;
  }
  .funny-emoji.show { opacity: 1; transform: translateX(0) rotate(0deg); }

  .funny-continue {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--purple-light);
    opacity: 0;
    cursor: pointer;
    transition: opacity 0.5s ease;
    animation: hintBlink2 2s ease-in-out infinite;
  }
  .funny-continue.show { opacity: 0.7; }
  @keyframes hintBlink2 {
    0%, 100% { opacity: 0.7; }
    50%       { opacity: 0.2; }
  }

</style>
</head>
<body>

<div class="petals-container" id="petals"></div>

<!-- STAGE 1: Countdown -->
<div id="stage-countdown">
  <div class="countdown-number" id="num3">3</div>
  <div class="countdown-number" id="num2">2</div>
  <div class="countdown-number" id="num1">1</div>
</div>

<!-- STAGE 2: Heart CTA -->
<div id="stage-heart">
  <div class="big-heart">💜</div>
  <p class="click-hint">toca para abrir</p>
</div>

<!-- STAGE 3: Reveal text -->
<div id="stage-reveal">
  <p class="reveal-text" id="reveal-text">
    Para una mujer<br>
    <em>muy especial...</em>
  </p>
</div>

<!-- STAGE 4: Card -->
<div id="stage-card">
  <div class="card">
    <div class="ribbon"></div>
    <span class="flowers-top">🌸🌺🌸</span>
    <p class="date-tag">8 de Marzo · Día Internacional de la Mujer</p>
    <h1 class="name">Hilla</h1>
    <div class="divider"><span>✦</span></div>
    <p class="message">
      Feliz día, una de las mujeres<br>
      más especiales de mi vida <span class="heart">♥</span>
    </p>
    <p class="date">Con todo el cariño · 2025</p>
    <div class="flowers-bottom">🌷 ✿ 🌷</div>
    <p class="signature">Atentamente: <strong>Jose</strong></p>
    <div class="purple-hearts">💜 💜 💜</div>
  </div>
</div>

<script>
  /* ── Petals ── */
  const emojis = ['🌸','🌺','🌷','✿','❀'];
  const petalContainer = document.getElementById('petals');
  function createPetal() {
    const el = document.createElement('div');
    el.className = 'petal';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (0.9 + Math.random() * 1.4) + 'rem';
    el.style.animationDuration = (5 + Math.random() * 8) + 's';
    el.style.animationDelay = (Math.random() * 3) + 's';
    petalContainer.appendChild(el);
    setTimeout(() => el.remove(), 14000);
  }

  /* ── Sparkles on card click ── */
  const sparkStyle = document.createElement('style');
  sparkStyle.textContent = `
    @keyframes sparkOut {
      from { opacity:1; transform: translate(0,0) scale(1); }
      to   { opacity:0; transform: translate(var(--tx), -60px) scale(0.3); }
    }`;
  document.head.appendChild(sparkStyle);

  function spawnSparks(cx, cy) {
    const sparks = ['✨','💜','🌸','⭐','💕'];
    for (let i = 0; i < 7; i++) {
      const s = document.createElement('div');
      const tx = ((Math.random() - 0.5) * 80) + 'px';
      s.textContent = sparks[Math.floor(Math.random() * sparks.length)];
      s.style.cssText = `
        position:fixed; pointer-events:none; z-index:999;
        left:${cx + (Math.random()-0.5)*80}px;
        top:${cy + (Math.random()-0.5)*80}px;
        font-size:${1 + Math.random()}rem;
        --tx:${tx};
        animation: sparkOut 0.9s ease-out forwards;`;
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 950);
    }
  }

  /* ══════════════════════════════════
     SEQUENCE LOGIC
  ══════════════════════════════════ */
  const stageCountdown = document.getElementById('stage-countdown');
  const stageHeart     = document.getElementById('stage-heart');
  const stageReveal    = document.getElementById('stage-reveal');
  const stageCard      = document.getElementById('stage-card');
  const revealText     = document.getElementById('reveal-text');

  function showNum(id, cb) {
    const el = document.getElementById(id);
    el.classList.add('show');
    setTimeout(() => {
      el.classList.add('hide');
      setTimeout(cb, 420);
    }, 900);
  }

  function fadeOut(el, cb) {
    el.style.opacity = '0';
    setTimeout(cb, 800);
  }

  // Start sequence after fonts load
  window.addEventListener('load', () => {
    // Kick off petals early (visible through dark screen once card shows)
    setTimeout(() => setInterval(createPetal, 700), 3500);

    // 3... 2... 1...
    setTimeout(() => showNum('num3', () =>
      showNum('num2', () =>
        showNum('num1', () => {
          // Fade out countdown, show heart
          fadeOut(stageCountdown, () => {
            stageCountdown.style.display = 'none';
            stageHeart.classList.add('visible');
            requestAnimationFrame(() => requestAnimationFrame(() =>
              stageHeart.classList.add('fade-in')
            ));
          });
        })
      )
    ), 300);
  });

  /* Heart click → reveal text → card */
  stageHeart.addEventListener('click', (e) => {
    // Ripple effect
    const ripple = document.createElement('div');
    const size = 80;
    ripple.className = 'ripple';
    ripple.style.cssText = `
      width:${size}px; height:${size}px;
      left:${e.clientX - size/2}px; top:${e.clientY - size/2}px;`;
    stageHeart.appendChild(ripple);
    setTimeout(() => ripple.remove(), 800);

    spawnSparks(e.clientX, e.clientY);

    // Fade heart out
    fadeOut(stageHeart, () => {
      stageHeart.style.display = 'none';

      // Show reveal text stage
      stageReveal.classList.add('visible');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        stageReveal.classList.add('fade-in');
        setTimeout(() => revealText.classList.add('show'), 200);
      }));

      // After 2s transition to funny stage
      setTimeout(() => {
        fadeOut(stageReveal, () => {
          stageReveal.style.display = 'none';
          showFunnyStage();
        });
      }, 2200);
    });
  });

  // Card sparkles
  document.addEventListener('click', (e) => {
    if (stageCard.classList.contains('visible')) {
      spawnSparks(e.clientX, e.clientY);
    }
  });

  /* ── Funny stage logic ── */
  const stageFunny      = document.getElementById('stage-funny');
  const funnyPhoto      = document.getElementById('funny-photo');
  const funnyMiddle     = document.getElementById('funny-middle');
  const funnyEmoji      = document.getElementById('funny-emoji');
  const funnyContinue   = document.getElementById('funny-continue');

  function showFunnyStage() {
    stageFunny.classList.add('visible');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      stageFunny.classList.add('fade-in');
      // Stagger the reveals
      setTimeout(() => funnyPhoto.classList.add('show'), 300);
      setTimeout(() => funnyMiddle.classList.add('show'), 700);
      setTimeout(() => funnyEmoji.classList.add('show'), 1100);
      setTimeout(() => funnyContinue.classList.add('show'), 1800);
    }));
  }

  stageFunny.addEventListener('click', () => {
    fadeOut(stageFunny, () => {
      stageFunny.style.display = 'none';
      stageCard.classList.add('visible');
      requestAnimationFrame(() => requestAnimationFrame(() =>
        stageCard.classList.add('fade-in')
      ));
      for (let i = 0; i < 14; i++) setTimeout(createPetal, i * 200);
    });
  });

</script>
</body>
</html>
